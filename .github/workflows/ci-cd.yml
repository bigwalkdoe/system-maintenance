name: System Maintenance Suite CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 3:00 UTC
    - cron: '0 3 * * *'

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Syntax and linting checks
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck on all scripts
        run: |
          find scripts -name "*.sh" -exec shellcheck {} +

      - name: Check script syntax
        run: |
          for script in scripts/**/*.sh scripts/*/*.sh; do
            if [ -f "$script" ]; then
              bash -n "$script"
            fi
          done

  # Run test suite
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Make test scripts executable
        run: |
          chmod +x tests/*.sh
          chmod +x scripts/**/*.sh scripts/*/*.sh 2>/dev/null || true

      - name: Run test suite
        run: |
          cd tests
          ./run_tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results/

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run security script tests
        run: |
          chmod +x tests/test_security.sh
          tests/test_security.sh

  # Docker build test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build monitoring stack
        run: |
          docker-compose -f docker-compose.monitoring.yml build

      - name: Test Docker compose syntax
        run: |
          docker-compose -f docker-compose.monitoring.yml config

      - name: Start monitoring stack
        run: |
          docker-compose -f docker-compose.monitoring.yml up -d

      - name: Check service health
        run: |
          # Wait for services to be healthy
          sleep 30
          docker-compose -f docker-compose.monitoring.yml ps

      - name: Stop monitoring stack
        if: always()
        run: |
          docker-compose -f docker-compose.monitoring.yml down

  # Multi-distribution test
  multi-distro-test:
    name: Multi-Distribution Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu-latest, ubuntu-20.04]
    needs: test-suite
    container:
      image: ${{ matrix.distro }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y bash git

      - name: Test distribution detection
        run: |
          bash scripts/detect-distribution.sh

      - name: Test distribution-agnostic scripts
        run: |
          bash -n scripts/maintenance/cleanup-system.sh
          bash -n scripts/security/docker-security-hardening.sh
          bash -n scripts/network/optimize-network-config.sh

  # ML anomaly detection test
  ml-test:
    name: ML Anomaly Detection Test
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          pip install numpy pandas scikit-learn scipy

      - name: Test ML anomaly detection script
        run: |
          python scripts/ml-anomaly/anomaly_detector.py --help

      - name: Test ML module imports
        run: |
          python -c "import numpy, pandas, sklearn, scipy; print('All ML libraries imported successfully')"

  # Cloud deployment test
  cloud-deployment-test:
    name: Cloud Deployment Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform format check
        run: |
          cd cloud-deployment/terraform
          terraform fmt -check

      - name: Terraform validate
        run: |
          cd cloud-deployment/terraform
          terraform init
          terraform validate

      - name: Set up Ansible
        run: |
          pip install ansible

      - name: Ansible lint
        run: |
          cd cloud-deployment/ansible
          ansible-playbook playbook.yml --syntax-check

      - name: Check Ansible inventory
        run: |
          cd cloud-deployment/ansible
          ansible-inventory inventory/ -i dev.yml --list

  # Documentation build
  documentation-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check documentation links
        run: |
          # Install markdown link checker
          npm install -g markdown-link-check

          # Check all markdown files
          find . -name "*.md" -exec markdown-link-check {} +

      - name: Check README formatting
        run: |
          # Check if README.md exists and is properly formatted
          if [ -f README.md ]; then
            echo "README.md exists"
            # Add more specific checks if needed
          else
            echo "ERROR: README.md missing"
            exit 1
          fi

      - name: Check documentation completeness
        run: |
          # Check if required documentation files exist
          required_docs=(
            "README.md"
            "docs/MULTI_DISTRIBUTION_SUPPORT.md"
            "docs/ADVANCED_SECURITY_FEATURES.md"
            "docs/ML_ANOMALY_DETECTION.md"
            "cloud-deployment/docs/CLOUD_DEPLOYMENT_GUIDE.md"
          )

          for doc in "${required_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "✅ $doc exists"
            else
              echo "❌ $doc missing"
              exit 1
            fi
          done

  # Integration test
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [docker-build, test-suite]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Compose
        run: |
          docker-compose version

      - name: Deploy monitoring stack
        run: |
          docker-compose -f docker-compose.monitoring.yml up -d

      - name: Test service connectivity
        run: |
          # Test Grafana
          curl -f http://localhost:3002 || echo "Grafana not ready yet"
          
          # Test Prometheus
          curl -f http://localhost:9090 || echo "Prometheus not ready yet"
          
          # Wait for services
          sleep 60
          
          # Retry connectivity tests
          curl -f http://localhost:3002
          curl -f http://localhost:9090

      - name: Test web dashboard
        run: |
          # Test web dashboard accessibility
          curl -f http://localhost:8081

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.monitoring.yml down -v

  # Deployment trigger (only on main branch)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-suite, security-scan, docker-build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deployment tag
        run: |
          TAG=$(date +'%Y%m%d-%H%M%S')
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag -a "deploy-$TAG" -m "Deployment $TAG"
          git push origin "deploy-$TAG"

      - name: Notify deployment
        run: |
          echo "Deployment triggered for tag: $TAG"
          # Add notification logic here (Slack, email, etc.)

  # Summary job
  summary:
    name: CI/CD Summary
    runs-on: ubuntu-latest
    needs: [syntax-check, test-suite, security-scan, docker-build, multi-distro-test, ml-test, cloud-deployment-test, documentation-build, integration-test]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate summary
        run: |
          echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Syntax Check: ${{ needs.syntax-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test Suite: ${{ needs.test-suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Multi-Distro Test: ${{ needs.multi-distro-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ML Test: ${{ needs.ml-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cloud Deployment Test: ${{ needs.cloud-deployment-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation Build: ${{ needs.documentation-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Test: ${{ needs.integration-test.result }}" >> $GITHUB_STEP_SUMMARY
