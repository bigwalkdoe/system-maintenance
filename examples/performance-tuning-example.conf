# Example Performance Tuning Configuration
# System performance optimization parameters

# CPU Performance Tuning
cpu:
  # CPU governor setting
  governor: performance
  
  # CPU affinity for critical processes
  affinity:
    - process: postgres
      cores: [0,1,2,3]
    - process: redis
      cores: [4,5]
  
  # CPU frequency scaling
  frequency_scaling:
    min_freq: 1.2GHz
    max_freq: 4.0GHz
    governor: performance

# Memory Performance Tuning
memory:
  # Swap configuration
  swappiness: 10
  swap_file_size: 4G
  swap_file_location: /swapfile
  
  # Memory overcommitment
  overcommit_memory: 1
  overcommit_ratio: 50
  
  # Huge pages
  hugepages:
    enabled: true
    number: 256
    size: 2MB
  
  # Transparent huge pages
  transparent_hugepages:
    enabled: true
    defrag: always

# Disk Performance Tuning
disk:
  # I/O scheduler
  io_scheduler: deadline
  # Options: noop, deadline, cfq, bfq, mq-deadline
  
  # Read-ahead settings
  read_ahead_kb: 128
  
  # I/O elevator settings
  elevator:
    queue_depth: 32
    nr_requests: 128
  
  # File system options
  filesystem:
    mount_options:
      - noatime
      - nodiratime
      - data=writeback
    
    # Ext4 specific
    ext4:
      journal_mode: ordered
      stripe_size: 64
  
  # NVMe SSD tuning
  ssd:
    enabled: true
    trim:
      schedule: weekly
      discard: false

# Network Performance Tuning
network:
  # TCP settings
  tcp:
    window_scaling: true
    timestamps: true
    selective_acks: true
    sack: true
    slow_start_after_idle: false
    fast_open: 3
  
  # TCP buffers
  tcp_buffers:
    rmem_max: 16777216
    wmem_max: 16777216
    rmem_default: 262144
    wmem_default: 262144
  
  # TCP congestion control
  congestion_control: bbr
  # Options: cubic, bbr, reno, vegas
  
  # Network interface tuning
  interfaces:
    eth0:
      mtu: 9000  # Jumbo frames
      tx_queue_len: 10000
      rx_queue_len: 1000
  
  # DNS caching
  dns:
    cache_enabled: true
    cache_size: 512
    nameservers:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1

# Docker Performance Tuning
docker:
  # Container resource limits
  container_limits:
    default_memory: 2G
    default_cpu_quota: 2.0
    default_memory_reservation: 1G
    
  # Docker daemon settings
  daemon:
    log_driver: json-file
    log_level: info
    log_max_size: 10m
    log_max_files: 3
    
    # Storage driver
    storage_driver: overlay2
    
    # Registry mirrors
    registry_mirrors:
      - https://registry.docker-cn.com
    
    # Insecure registries
    insecure_registries:
      - registry.internal.example.com:5000

# Application Performance Tuning
application:
  # PostgreSQL tuning
  postgresql:
    shared_buffers: 4GB
    effective_cache_size: 12GB
    work_mem: 64MB
    maintenance_work_mem: 512MB
    max_connections: 200
    random_page_cost: 1.1
    effective_io_concurrency: 200
    
  # Redis tuning
  redis:
    maxmemory: 4GB
    maxmemory_policy: allkeys-lru
    save_interval: 900
    save_changes: 1
    tcp_keepalive: 300
    timeout: 0
  
  # Nginx tuning
  nginx:
    worker_processes: auto
    worker_connections: 4096
    keepalive_timeout: 30
    client_body_buffer_size: 128k
    client_max_body_size: 10m
    gzip_enabled: true
    
    # Cache settings
    cache:
      enabled: true
      path: /var/cache/nginx
      max_size: 10g
      inactive: 60m

# System-wide limits
limits:
  # File descriptors
  file_descriptors:
    soft: 65536
    hard: 65536
  
  # Maximum processes
  max_processes:
    soft: 4096
    hard: 8192
  
  # Memory limits
  memory:
    locked: unlimited
    address_space: unlimited

# Monitoring and Logging
monitoring:
  # Performance monitoring
  performance_monitoring:
    enabled: true
    interval: 60s
    metrics:
      - cpu_usage
      - memory_usage
      - disk_io
      - network_io
      - process_count
  
  # Log rotation
  log_rotation:
    enabled: true
    max_size: 100M
    max_age: 30
    compress: true
    
  # Performance profiling
  profiling:
    enabled: false
    interval: 300s
    duration: 60s
