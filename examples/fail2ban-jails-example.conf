# Example Fail2Ban Jail Configurations
# Customize based on your security requirements

[DEFAULT]
# Default banning time (1 hour)
bantime = 3600

# Find time window (10 minutes)
findtime = 600

# Maximum retry attempts before ban
maxretry = 5

# Email notifications
destemail = admin@example.com
sendername = Fail2Ban
mta = sendmail
action = %(action_)s
action_mwl = %(banaction)s[name=%(__name__)s, port="%(port)s", protocol="%(protocol)s", chain="%(chain)s"]
             %(mta)s-whois[name=%(__name__)s, dest="%(destemail)s", sender="%(sendername)s"]
             %(mta)s-whois[name=%(__name__)s, dest="%(destemail)s", sender="%(sendername)s", chain="%(chain)s"]

# SSH Protection
[sshd]
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
bantime = 7200  # 2 hours

# Web Server Protection
[apache-auth]
enabled = true
port = http,https
filter = apache-auth
logpath = /var/log/apache2/error.log
maxretry = 6

[nginx-http-auth]
enabled = true
port = http,https
filter = nginx-http-auth
logpath = /var/log/nginx/error.log
maxretry = 6

# Protection against brute force attacks on web forms
[apache-noscript]
enabled = true
port = http,https
filter = apache-noscript
logpath = /var/log/apache2/error.log
maxretry = 6

# Protection against scanner
[apache-overflows]
enabled = true
port = http,https
filter = apache-overflows
logpath = /var/log/apache2/error.log
maxretry = 2

# Web Application Protection
[phpmyadmin]
enabled = true
port = http,https
filter = phpmyadmin
logpath = /var/log/apache2/error.log
maxretry = 3

# WordPress Protection
[wordpress]
enabled = true
port = http,https
filter = wordpress
logpath = /var/log/apache2/error.log
maxretry = 3

# Email Server Protection
[postfix]
enabled = true
port = smtp,ssmtp
filter = postfix
logpath = /var/log/mail.log
maxretry = 5

[dovecot]
enabled = true
port = pop3,pop3s,imap,imaps
filter = dovecot
logpath = /var/log/mail.log
maxretry = 5

# Database Protection
[mysqld-auth]
enabled = true
port = 3306
filter = mysqld-auth
logpath = /var/log/mysql/error.log
maxretry = 5

[postgresql-auth]
enabled = true
port = 5432
filter = postgresql-auth
logpath = /var/log/postgresql/postgresql-*.log
maxretry = 5

# FTP Protection
[vsftpd]
enabled = true
port = ftp,ftp-data,ftps,ftps-data
filter = vsftpd
logpath = /var/log/vsftpd.log
maxretry = 5

[pure-ftpd]
enabled = true
port = ftp,ftp-data,ftps,ftps-data
filter = pure-ftpd
logpath = /var/log/pure-ftpd.log
maxretry = 5

# Custom Application Protection
[custom-application]
enabled = true
port = http,https
filter = custom-application
logpath = /var/log/application/application.log
maxretry = 10
findtime = 3600  # 1 hour
bantime = 86400  # 24 hours
