groups:
  - name: system_alerts
    interval: 30s
    rules:
      # CPU Alerts
      - alert: HighCPUUsage
        expr: 100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: CriticalCPUUsage
        expr: 100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) > 95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      # Memory Alerts
      - alert: HighMemoryUsage
        expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: CriticalMemoryUsage
        expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      # Disk Alerts
      - alert: HighDiskUsage
        expr: 100 * (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage detected"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: CriticalDiskUsage
        expr: 100 * (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk usage detected"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"

      # Network Alerts
      - alert: HighNetworkIn
        expr: rate(node_network_receive_bytes_total[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network traffic inbound"
          description: "Network inbound traffic is {{ $value }} bytes/sec on {{ $labels.instance }}"

      - alert: HighNetworkOut
        expr: rate(node_network_transmit_bytes_total[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network traffic outbound"
          description: "Network outbound traffic is {{ $value }} bytes/sec on {{ $labels.instance }}"

      # Service Down Alerts
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node exporter is down"
          description: "Node exporter has been down for more than 5 minutes on {{ $labels.instance }}"

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "PostgreSQL exporter has been down for more than 5 minutes"

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter is down"
          description: "Redis exporter has been down for more than 5 minutes"

      - alert: GuardrailAPIDown
        expr: up{job="guardrail-api"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Guardrail API is down"
          description: "Guardrail API has been down for more than 5 minutes"

  - name: database_alerts
    interval: 30s
    rules:
      # PostgreSQL Alerts
      - alert: HighPostgresConnections
        expr: pg_stat_activity_count > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connection count"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: SlowPostgresQueries
        expr: pg_stat_statements_mean_exec_time_ms > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Slow PostgreSQL queries detected"
          description: "Average query execution time is {{ $value }}ms"

      - alert: LowPostgresCacheHitRate
        expr: pg_stat_database_blk_hit_rate < 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low PostgreSQL cache hit rate"
          description: "Cache hit rate is {{ $value }}"

      # Redis Alerts
      - alert: HighRedisConnections
        expr: redis_connected_clients > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis connection count"
          description: "Redis has {{ $value }} connected clients"

      - alert: LowRedisCacheHitRate
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) * 100 < 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low Redis cache hit rate"
          description: "Redis cache hit rate is {{ $value }}%"

  - name: docker_alerts
    interval: 30s
    rules:
      - alert: HighContainerCPU
        expr: rate(container_cpu_usage_seconds_total{container!=""}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High container CPU usage"
          description: "Container {{ $labels.name }} is using {{ $value }} CPU"

      - alert: HighContainerMemory
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High container memory usage"
          description: "Container {{ $labels.name }} is using {{ $value }} of its memory limit"
