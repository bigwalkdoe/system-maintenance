---
# Ansible playbook for System Maintenance Suite deployment
# Supports multiple cloud providers and on-premises deployments

- name: Deploy System Maintenance Suite
  hosts: all
  become: yes
  vars:
    project_name: "system-maintenance"
    installation_dir: "/opt/{{ project_name }}"
    backup_dir: "/backups"
    monitoring_enabled: true
    security_enabled: true
    cloud_deployment: false
    environment: "production"

  handlers:
    - name: Restart docker
      service:
        name: docker
        state: restarted

    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: Restart systemd
      systemd:
        daemon_reload: yes

  tasks:
    - name: Update system packages
      package:
        update_cache: yes
        upgrade: yes
      when: ansible_os_family == "Debian"

    - name: Install required packages (Debian/Ubuntu)
      package:
        name:
          - curl
          - wget
          - git
          - docker.io
          - docker-compose
          - python3
          - python3-pip
          - fail2ban
          - ufw
          - unzip
          - software-properties-common
          - htop
          - net-tools
        state: present
      when: ansible_os_family == "Debian"

    - name: Install required packages (RHEL/CentOS)
      package:
        name:
          - curl
          - wget
          - git
          - docker
          - python3
          - python3-pip
          - fail2ban
          - firewalld
          - unzip
          - htop
          - net-tools
        state: present
      when: ansible_os_family == "RedHat"

    - name: Create installation directory
      file:
        path: "{{ installation_dir }}"
        state: directory
        mode: '0755'

    - name: Clone system maintenance repository
      git:
        repo: "https://github.com/YOUR_USERNAME/{{ project_name }}.git"
        dest: "{{ installation_dir }}"
        version: main
        force: yes

    - name: Run installation script
      command: "{{ installation_dir }}/install.sh"
      args:
        chdir: "{{ installation_dir }}"
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Enable and start Docker
      service:
        name: docker
        enabled: yes
        state: started
      notify: Restart docker

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Create backup directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ backup_dir }}/databases"
        - "{{ backup_dir }}/docker-volumes"
        - "{{ backup_dir }}/configurations"
        - "{{ backup_dir }}/projects"

    - name: Deploy monitoring stack
      command: "{{ installation_dir }}/scripts/deploy-monitoring.sh"
      args:
        chdir: "{{ installation_dir }}"
      when: monitoring_enabled
      async: 300
      poll: 10

    - name: Configure firewall (UFW)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"
        - "3002"
        - "9090"
        - "8081"
      when: ansible_os_family == "Debian"

    - name: Enable UFW
      ufw:
        state: enabled
      when: ansible_os_family == "Debian"

    - name: Configure firewall (firewalld)
      firewalld:
        service: "{{ item }}"
        permanent: yes
        immediate: yes
        state: enabled
      loop:
        - ssh
        - http
        - https
      when: ansible_os_family == "RedHat"

    - name: Configure Fail2Ban
      template:
        src: templates/fail2ban.j2
        dest: /etc/fail2ban/jail.local
        mode: '0644'
      notify: Restart fail2ban

    - name: Enable Fail2Ban
      service:
        name: fail2ban
        enabled: yes
        state: started

    - name: Copy systemd services
      copy:
        src: "{{ installation_dir }}/systemd/"
        dest: /etc/systemd/system/
        mode: '0644'
      notify: Restart systemd

    - name: Enable systemd timers
      systemd:
        name: "{{ item }}.timer"
        enabled: yes
        state: started
        daemon_reload: yes
      loop:
        - backup
        - maintenance
        - performance-check
        - network-monitor
        - disk-space-check
        - security-scan

    - name: Create cloud configuration
      template:
        src: templates/cloud-config.j2
        dest: /etc/system-maintenance/cloud-config.yml
        mode: '0644'
      when: cloud_deployment

    - name: Configure log rotation
      copy:
        content: |
          /var/log/system-maintenance/*.log {
              daily
              rotate 7
              compress
              delaycompress
              missingok
              notifempty
              create 0640 {{ ansible_user }} {{ ansible_user }}
          }
        dest: /etc/logrotate.d/system-maintenance
        mode: '0644'

    - name: Create health check script
      copy:
        content: |
          #!/bin/bash
          echo "System Maintenance Health Check"
          echo "Status: OK"
          echo "Environment: {{ environment }}"
          echo "Hostname: {{ ansible_hostname }}"
          echo "Timestamp: $(date)"
        dest: /usr/local/bin/health-check.sh
        mode: '0755'

    - name: Create monitoring cron job
      cron:
        name: "Cloud monitoring"
        minute: "*/5"
        job: "/usr/local/bin/cloud-monitor.sh"
        user: "{{ ansible_user }}"
      when: cloud_deployment

    - name: Create backup cron job
      cron:
        name: "Daily backup"
        hour: "2"
        minute: "0"
        job: "{{ installation_dir }}/scripts/backups/backup-all.sh"
        user: "{{ ansible_user }}"

    - name: Create maintenance cron job
      cron:
        name: "Weekly maintenance"
        weekday: "0"
        hour: "3"
        minute: "0"
        job: "{{ installation_dir }}/scripts/maintenance/run-maintenance.sh"
        user: "{{ ansible_user }}"

    - name: Create security scan cron job
      cron:
        name: "Weekly security scan"
        weekday: "6"
        hour: "4"
        minute: "0"
        job: "{{ installation_dir }}/scripts/security/run-security-hardening.sh"
        user: "{{ ansible_user }}"

    - name: Install Python dependencies
      pip:
        name:
          - docker
          - requests
          - prometheus-client
        executable: pip3

    - name: Create system check script
      copy:
        content: |
          #!/usr/bin/env python3
          import subprocess
          import json
          import os
          
          def get_cpu_usage():
              try:
                  result = subprocess.run(['top', '-bn1'], capture_output=True, text=True)
                  # Parse CPU usage from top output
                  return 25.0  # Placeholder
              except:
                  return 0.0
          
          def get_memory_usage():
              try:
                  result = subprocess.run(['free', '-m'], capture_output=True, text=True)
                  # Parse memory usage
                  return 50.0  # Placeholder
              except:
                  return 0.0
          
          def get_disk_usage():
              try:
                  result = subprocess.run(['df', '-h', '/'], capture_output=True, text=True)
                  # Parse disk usage
                  return 40.0  # Placeholder
              except:
                  return 0.0
          
          def main():
              health = {
                  'cpu_usage': get_cpu_usage(),
                  'memory_usage': get_memory_usage(),
                  'disk_usage': get_disk_usage(),
                  'timestamp': os.popen('date').read().strip()
              }
              print(json.dumps(health))
          
          if __name__ == '__main__':
              main()
        dest: /usr/local/bin/system-check.py
        mode: '0755'

    - name: Create deployment status file
      copy:
        content: |
          deployment_time: {{ ansible_date_time.iso8601 }}
          environment: {{ environment }}
          monitoring_enabled: {{ monitoring_enabled }}
          security_enabled: {{ security_enabled }}
          cloud_deployment: {{ cloud_deployment }}
          ansible_hostname: {{ ansible_hostname }}
          ansible_os_family: {{ ansible_os_family }}
        dest: /etc/system-maintenance/deployment-status.yml
        mode: '0644'

    - name: Display deployment summary
      debug:
        msg:
          - "System Maintenance Suite deployment completed!"
          - "Environment: {{ environment }}"
          - "Installation directory: {{ installation_dir }}"
          - "Monitoring enabled: {{ monitoring_enabled }}"
          - "Security enabled: {{ security_enabled }}"
          - "Cloud deployment: {{ cloud_deployment }}"
